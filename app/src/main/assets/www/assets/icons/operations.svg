<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
<defs>
  <linearGradient id="operations_g1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.05"/>
    <stop offset="1" stop-color="#000000" stop-opacity="0.12"/>
  </linearGradient>
  <filter id="operations_ds" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
  </filter>
  <filter id="operations_glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <linearGradient id="operations_bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#06b6d4"/>
    <stop offset="1" stop-color="#2563eb"/>
  </linearGradient>
  <linearGradient id="operations_truckWhite" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="1" stop-color="#e5e7eb"/>
  </linearGradient>
  <linearGradient id="operations_metal" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#e2e8f0"/>
    <stop offset="1" stop-color="#94a3b8"/>
  </linearGradient>
  <linearGradient id="operations_dnBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0ea5e9"/>
    <stop offset="1" stop-color="#1d4ed8"/>
  </linearGradient>
</defs>

<!-- glass squircle base -->
<rect x="10" y="10" width="108" height="108" rx="26" fill="url(#operations_bg)" filter="url(#operations_ds)"/>
<path d="M18 36 C34 20, 60 18, 92 18 C104 18, 112 22, 116 26 L116 34 C110 28, 102 24, 92 24 C60 24, 40 26, 24 40 Z" fill="white" opacity="0.22"/>
<rect x="14" y="14" width="100" height="100" rx="24" fill="url(#operations_g1)" opacity="0.45"/>

<!-- Highloader truck (dnata colors) -->
<g filter="url(#operations_glow)">
  <!-- ground shadow -->
  <ellipse cx="66" cy="94" rx="44" ry="10" fill="#0f172a" opacity="0.18"/>

  <!-- cargo box -->
  <rect x="42" y="50" width="52" height="30" rx="6" fill="url(#operations_truckWhite)"/>
  <rect x="42" y="50" width="52" height="30" rx="6" fill="url(#operations_dnBlue)" opacity="0.08"/>
  <!-- dnata stripe -->
  <rect x="42" y="70" width="52" height="6" rx="3" fill="url(#operations_dnBlue)" opacity="0.95"/>
  <!-- dnata text (stylized) -->
  <text x="48" y="68" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#0ea5e9" opacity="0.95">dnata</text>

  <!-- cab -->
  <path d="M26 64 C26 56, 30 50, 38 50 L46 50 L46 80 L28 80 C26 74, 26 70, 26 64 Z" fill="url(#operations_truckWhite)"/>
  <path d="M32 56 L42 56 L42 66 L32 66 Z" fill="#93c5fd" opacity="0.95"/>
  <path d="M30 74 L46 74" stroke="#94a3b8" stroke-width="3" opacity="0.6" stroke-linecap="round"/>

  <!-- highloader lift platform (raised) -->
  <!-- scissor -->
  <path d="M78 78 L94 62" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <path d="M78 62 L94 78" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <circle cx="86" cy="70" r="3.2" fill="#111827" opacity="0.65"/>

  <!-- platform deck -->
  <path d="M88 46 L112 46 L112 60 L92 60 C90 60, 88 58, 88 56 Z" fill="url(#operations_metal)"/>
  <path d="M90 50 L110 50" stroke="#ffffff" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  <!-- rails -->
  <path d="M90 44 L90 60" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <path d="M112 44 L112 60" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <path d="M90 44 L112 44" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

  <!-- lift arm base -->
  <path d="M94 80 L104 80" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>

  <!-- chassis -->
  <rect x="26" y="80" width="68" height="10" rx="5" fill="#dbeafe" opacity="0.95"/>
  <rect x="26" y="84" width="68" height="6" rx="3" fill="#1d4ed8" opacity="0.22"/>

  <!-- wheels -->
  <g>
    <circle cx="38" cy="90" r="8.5" fill="#111827"/>
    <circle cx="38" cy="90" r="4.3" fill="#9ca3af"/>
    <circle cx="78" cy="90" r="8.5" fill="#111827"/>
    <circle cx="78" cy="90" r="4.3" fill="#9ca3af"/>
  </g>
</g>
</svg>
